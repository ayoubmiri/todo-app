name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # 1. TESTS BACKEND AVEC POSTGRESQL
  # ============================================
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installer les dépendances
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Lancer les tests backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: |
          pytest -v --cov=app --cov-report=term

  # ============================================
  # 2. TESTS FRONTEND REACT
  # ============================================
  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Installer les dépendances
        working-directory: ./frontend
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
      
      - name: Lancer les tests frontend
        working-directory: ./frontend
        run: npm test -- --watchAll=false --coverage
      
      - name: Construire le frontend
        working-directory: ./frontend
        run: npm run build

  # ============================================
  # 3. TESTS D'INTÉGRATION
  # ============================================
integration-tests:
  runs-on: ubuntu-latest
  needs: [test-backend, test-frontend]
  
  services:
    postgres:
      image: postgres:15
      env:
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpass
        POSTGRES_DB: testdb
      ports:
        - 5432:5432
      options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
  
  steps:
    - name: Récupérer le code
      uses: actions/checkout@v4
    
    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Installer les dépendances
      working-directory: ./backend
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Lancer les tests d'intégration
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      run: |
        pytest tests/test_integration.py -v
  # ============================================
  # 4. DOCKER BUILD & PUSH (SEULEMENT SUR MAIN)
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Construire et pousser le backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
      
      - name: Construire et pousser le frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest

  # ============================================
  # 5. DÉPLOIEMENT (SIMULATION)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Simuler le déploiement
        run: |
          echo "=========================================="
          echo "🚀 DÉPLOIEMENT DU PROJET TODO APP"
          echo "=========================================="
          echo ""
          echo "✅ Backend:  ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest"
          echo "✅ Frontend: ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest"
          echo ""
          echo "📦 Images Docker poussées avec succès"
          echo ""
          echo "🌐 Application disponible :"
          echo "   - API: http://localhost:8000"
          echo "   - App: http://localhost:3000"
          echo ""
          echo "🎉 DÉPLOIEMENT TERMINÉ AVEC SUCCÈS !"
          echo "=========================================="
